name: Build Baseflight (Bluepill NAZE)

on:
push:
pull_request:

jobs:
build:
runs-on: ubuntu-latest

steps:
- name: Checkout source
  uses: actions/checkout@v3

- name: Install ARM toolchain
  run: |
    sudo apt update
    sudo apt install -y gcc-arm-none-eabi make

- name: Clean build
  run: make clean

- name: Build NAZE target
  run: make NAZE

- name: Upload firmware
  uses: actions/upload-artifact@v4
  with:
    name: baseflight-naze-bluepill
    path: |
      obj/main/baseflight_NAZE.hex
      obj/main/baseflight_NAZE.bin
